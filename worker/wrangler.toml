# Cloudflare Image Resizing Worker
# Serves R2 objects with on-the-fly image transformations via cf.image
#
# SETUP:
# 1. Replace ACCOUNT_ID with your Cloudflare account ID
# 2. Replace BUCKET_NAME with your R2 bucket name
# 3. Enable "Image Resizing" in Cloudflare dashboard (Zone > Speed > Optimization > Image Resizing)
# 4. Deploy: pnpm deploy
# 5. Configure custom domain in Cloudflare dashboard (Workers > image-resizing > Triggers > Custom Domains)
#    e.g. assets.distribute.you

name = "image-resizing"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# account_id = "YOUR_ACCOUNT_ID"

[[r2_buckets]]
binding = "BUCKET"
# bucket_name = "YOUR_BUCKET_NAME"
